{% extends "layout.html" %}
{% block content %}
<div class="hero-home">
    <h1>¡Bienvenido, {{ current_user.username }}!</h1>
    <p>Has iniciado sesión correctamente. ¿Qué te gustaría hacer?</p>
</div>
<div class="welcome-cards">
    <a href="{{ url_for('main.account') }}" class="welcome-card">
        <i class="fas fa-user"></i>
        <span>Mi cuenta</span>
    </a>
    <a href="{{ url_for('main.list_containers') }}" class="welcome-card">
        <i class="fas fa-boxes"></i>
        <span>Mis contenedores</span>
    </a>
    <a href="{{ url_for('main.create_container') }}" class="welcome-card">
        <i class="fas fa-plus-circle"></i>
        <span>Crear contenedor</span>
    </a>
    <a href="{{ url_for('main.contacto') }}" class="welcome-card">
        <i class="fas fa-envelope"></i>
        <span>Contacto</span>
    </a>
</div>
{% endblock %}
